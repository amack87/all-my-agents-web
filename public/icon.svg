<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#60a5fa" stroke-width="1">
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
  </g>

  <!-- Connection lines from center to outer nodes -->
  <g stroke="url(#glow)" stroke-width="2.5" opacity="0.5">
    <!-- Top -->
    <line x1="256" y1="200" x2="256" y2="120"/>
    <!-- Top-right -->
    <line x1="296" y1="216" x2="370" y2="142"/>
    <!-- Right -->
    <line x1="312" y1="256" x2="392" y2="256"/>
    <!-- Bottom-right -->
    <line x1="296" y1="296" x2="370" y2="370"/>
    <!-- Bottom -->
    <line x1="256" y1="312" x2="256" y2="392"/>
    <!-- Bottom-left -->
    <line x1="216" y1="296" x2="142" y2="370"/>
    <!-- Left -->
    <line x1="200" y1="256" x2="120" y2="256"/>
    <!-- Top-left -->
    <line x1="216" y1="216" x2="142" y2="142"/>
  </g>

  <!-- Center hub node -->
  <circle cx="256" cy="256" r="56" fill="none" stroke="url(#glow)" stroke-width="3" filter="url(#softglow)" opacity="0.9"/>
  <circle cx="256" cy="256" r="40" fill="#60a5fa" opacity="0.15"/>

  <!-- Terminal prompt in center -->
  <text x="236" y="268" font-family="monospace" font-weight="bold" font-size="42" fill="url(#glow)" filter="url(#innerglow)">$_</text>

  <!-- Outer agent nodes -->
  <g filter="url(#innerglow)">
    <!-- Top -->
    <circle cx="256" cy="108" r="20" fill="#1a1a2e" stroke="url(#glow2)" stroke-width="2.5"/>
    <circle cx="256" cy="108" r="8" fill="#a78bfa" opacity="0.7"/>

    <!-- Top-right -->
    <circle cx="378" cy="134" r="20" fill="#1a1a2e" stroke="url(#glow2)" stroke-width="2.5"/>
    <circle cx="378" cy="134" r="8" fill="#60a5fa" opacity="0.7"/>

    <!-- Right -->
    <circle cx="404" cy="256" r="20" fill="#1a1a2e" stroke="url(#glow2)" stroke-width="2.5"/>
    <circle cx="404" cy="256" r="8" fill="#a78bfa" opacity="0.7"/>

    <!-- Bottom-right -->
    <circle cx="378" cy="378" r="20" fill="#1a1a2e" stroke="url(#glow2)" stroke-width="2.5"/>
    <circle cx="378" cy="378" r="8" fill="#60a5fa" opacity="0.7"/>

    <!-- Bottom -->
    <circle cx="256" cy="404" r="20" fill="#1a1a2e" stroke="url(#glow2)" stroke-width="2.5"/>
    <circle cx="256" cy="404" r="8" fill="#a78bfa" opacity="0.7"/>

    <!-- Bottom-left -->
    <circle cx="134" cy="378" r="20" fill="#1a1a2e" stroke="url(#glow2)" stroke-width="2.5"/>
    <circle cx="134" cy="378" r="8" fill="#60a5fa" opacity="0.7"/>

    <!-- Left -->
    <circle cx="108" cy="256" r="20" fill="#1a1a2e" stroke="url(#glow2)" stroke-width="2.5"/>
    <circle cx="108" cy="256" r="8" fill="#a78bfa" opacity="0.7"/>

    <!-- Top-left -->
    <circle cx="134" cy="134" r="20" fill="#1a1a2e" stroke="url(#glow2)" stroke-width="2.5"/>
    <circle cx="134" cy="134" r="8" fill="#60a5fa" opacity="0.7"/>
  </g>
</svg>
